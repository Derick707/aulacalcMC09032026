<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Cabeçalho-->
    <header class="header">
        <div class="loo-area">
            <img src="imc.png" alt="Logo da pagina de calculo de IMC" class="logo">
            <h1>Calculadora de IMC</h1>
        </div>
    </header>

    <!--Conteudo Principal-->
    <main>
        <div class="container">

            <h2>Calcule o seu indice de massa coporal</h2>

            <label for="peso">Informe seu peso em (Kg)</label>
            <input type="number" id="peso" placeholder="Ex: 80" step="0.1">

            <label for="altura">Informe sua altura em (M)</label>
            <input type="number" id="altura" placeholder="Ex: 1,75" step="0.1">

            <button onclick="calcularIMC()">Calcular</button>
            <div id="resultado"></div>
            
        </div>
    </main>

    
</body>
<script src="script.js"></script>
</html>
